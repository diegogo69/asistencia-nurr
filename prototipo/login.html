<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Asistencia NURR</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Asistencia ULA-NURR</h2>
            <p style="margin-bottom: 25px; color: var(--text-light);">Autenticación Administrativa</p>
            
            <form class="simulate-save">
                <div class="form-group" style="text-align: left;">
                    <label for="documento">Documento / Usuario</label>
                    <input type="text" id="documento" placeholder="Ingrese su documento" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Iniciar Sesión</button>
            </form>
            
            <div style="margin-top: 20px;">
                <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-size: 14px;">Volver al Dashboard (Prototipo)</a>
            </div>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
